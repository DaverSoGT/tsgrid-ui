<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Smoke: Tooltip</title>
    <link rel="stylesheet" href="../../dist/w2ui.css">
    <style>
        body { margin: 60px; }
        #hover-target {
            display: inline-block;
            padding: 10px 20px;
            background: #e0e0e0;
            border: 1px solid #999;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="hover-target">Hover me for tooltip</div>
    <script src="../../libs/jquery/jquery-3.5.1.min.js"></script>
    <script src="../../dist/w2ui.js"></script>
    <script>
        window._smokeTooltip = w2tooltip
        window._smokeReady = true

        // Attach tooltip with autoShow so it shows on mouseover
        w2tooltip.attach('#hover-target', {
            name: 'smoke-tip',
            text: 'Smoke tooltip content',
            position: 'top|bottom',
            autoShow: true
        })
    </script>
</body>
</html>
