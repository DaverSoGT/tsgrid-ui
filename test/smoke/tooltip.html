<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Smoke: Tooltip</title>
    <link rel="stylesheet" href="../../dist/tsgrid-ui.css">
    <style>
        body { margin: 60px; }
        #hover-target {
            display: inline-block;
            padding: 10px 20px;
            background: #e0e0e0;
            border: 1px solid #999;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="hover-target">Hover me for tooltip</div>
    <script type="module">
        import { TsTooltip, Tooltip } from '../../dist/tooltip.es6.js'
        window.TsTooltip = TsTooltip
        window.Tooltip = Tooltip
        window._smokeTooltip = TsTooltip

        // Attach tooltip with autoShow so it shows on mouseover
        TsTooltip.attach('#hover-target', {
            name: 'smoke-tip',
            text: 'Smoke tooltip content',
            position: 'top|bottom',
            autoShow: true
        })

        window._smokeReady = true
    </script>
</body>
</html>
