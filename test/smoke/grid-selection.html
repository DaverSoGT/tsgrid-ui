<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Smoke: Grid Selection</title>
    <link rel="stylesheet" href="../../dist/w2ui.css">
    <style>
        body { margin: 0; padding: 0; }
        #grid { width: 800px; height: 400px; }
    </style>
</head>
<body>
    <div id="grid"></div>
    <script src="../../libs/jquery/jquery-3.5.1.min.js"></script>
    <script src="../../dist/w2ui.js"></script>
    <script>
        var grid = new w2grid({
            name: 'grid-selection',
            multiSelect: true,
            columns: [
                { field: 'recid',  caption: 'ID',   size: '50px' },
                { field: 'fname',  caption: 'Name', size: '60%' },
                { field: 'status', caption: 'Status', size: 'auto' }
            ],
            records: [
                { recid: 1, fname: 'Alice', status: 'active' },
                { recid: 2, fname: 'Bob',   status: 'inactive' },
                { recid: 3, fname: 'Carol', status: 'active' },
                { recid: 4, fname: 'Dave',  status: 'active' },
                { recid: 5, fname: 'Eve',   status: 'inactive' }
            ]
        })
        grid.render(document.getElementById('grid'))
        window._smokeGrid = grid
        window._smokeReady = true
    </script>
</body>
</html>
