<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Smoke: Popup</title>
    <link rel="stylesheet" href="../../dist/tsgrid-ui.css">
    <style>
        body { margin: 10px; }
        button { margin: 5px; padding: 8px 16px; }
    </style>
</head>
<body>
    <button id="btn-open">Open Popup</button>
    <button id="btn-alert">Alert</button>
    <button id="btn-confirm">Confirm</button>
    <script type="module">
        import { TsPopup, TsAlert, TsConfirm, TsPrompt } from '../../dist/popup.es6.js'
        window.TsPopup = TsPopup
        window.TsAlert = TsAlert
        window.TsConfirm = TsConfirm
        window.TsPrompt = TsPrompt
        window._smokePopup = TsPopup
        window._smokeAlert = TsAlert
        window._smokeConfirm = TsConfirm
        window._smokePrompt = TsPrompt
        window._smokeReady = true

        document.getElementById('btn-open').addEventListener('click', function() {
            TsPopup.open({
                title: 'Smoke Test Popup',
                body: '<div id="popup-body-content" style="padding:20px">Hello from smoke test</div>',
                width: 400,
                height: 300
            })
        })
    </script>
</body>
</html>
