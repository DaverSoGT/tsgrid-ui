<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Smoke: Popup</title>
    <link rel="stylesheet" href="../../dist/w2ui.css">
    <style>
        body { margin: 10px; }
        button { margin: 5px; padding: 8px 16px; }
    </style>
</head>
<body>
    <button id="btn-open">Open Popup</button>
    <button id="btn-alert">Alert</button>
    <button id="btn-confirm">Confirm</button>
    <script src="../../libs/jquery/jquery-3.5.1.min.js"></script>
    <script src="../../dist/w2ui.js"></script>
    <script>
        window._smokePopup = w2popup
        window._smokeAlert = w2alert
        window._smokeConfirm = w2confirm
        window._smokePrompt = w2prompt
        window._smokeReady = true

        document.getElementById('btn-open').addEventListener('click', function() {
            w2popup.open({
                title: 'Smoke Test Popup',
                body: '<div id="popup-body-content" style="padding:20px">Hello from smoke test</div>',
                width: 400,
                height: 300
            })
        })
    </script>
</body>
</html>
