<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Smoke: Sidebar</title>
    <link rel="stylesheet" href="../../dist/tsgrid-ui.css">
    <style>
        body { margin: 0; padding: 0; }
        #sidebar { width: 250px; height: 500px; }
    </style>
</head>
<body>
    <div id="sidebar"></div>
    <script type="module">
        import { TsSidebar } from '../../dist/sidebar.es6.js'
        window.TsSidebar = TsSidebar
        var sidebar = new TsSidebar({
            name: 'smoke-sidebar',
            nodes: [
                { id: 'root1', text: 'Item One',   icon: 'TsUi-icon-info' },
                { id: 'root2', text: 'Item Two',   icon: 'TsUi-icon-info' },
                {
                    id: 'parent1',
                    text: 'Parent Node',
                    icon: 'TsUi-icon-info',
                    expanded: false,
                    nodes: [
                        { id: 'child1', text: 'Child One', icon: 'TsUi-icon-info' },
                        { id: 'child2', text: 'Child Two', icon: 'TsUi-icon-info' }
                    ]
                },
                { id: 'root3', text: 'Item Three', icon: 'TsUi-icon-info' },
                { id: 'root4', text: 'Item Four',  icon: 'TsUi-icon-info' }
            ]
        })
        sidebar.render(document.getElementById('sidebar'))
        window._smokeSidebar = sidebar
        window._smokeReady = true
    </script>
</body>
</html>
